name: Tests and Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  cmake-build-type: "Debug"
  cmake-parallel: 10
  POCL_DEVICES: "cpu"
  POCL_TARGETS: "host"
  OCL_ICD_VENDORS: "/etc/OpenCL/vendors"
  OPENCL_VENDOR_PATH: "/etc/OpenCL/vendors"

jobs:
  test:
    name: Tests-${{ matrix.buildtype }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        buildtype: [Debug]
        cxx: [clang++]
        cc: [clang]

    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Restore apt cache
        uses: awalsh128/cache-apt-pkgs-action@v1.4.2
        with:
          packages: clang lcov gcovr pocl-opencl-icd ocl-icd-opencl-dev opencl-headers clinfo libpocl-dev libhwloc-dev
          version: 1.0

      - name: Setup OpenCL environment
        run: |
          set -euo pipefail
          
          # Ensure pocl ICD is properly registered
          sudo mkdir -p /etc/OpenCL/vendors
          if [ ! -f /etc/OpenCL/vendors/pocl.icd ]; then
            echo "Registering pocl ICD..."
            echo "/usr/lib/x86_64-linux-gnu/libpocl.so" | sudo tee /etc/OpenCL/vendors/pocl.icd > /dev/null
          fi
          
          # Verify pocl installation
          echo "Pocl ICD vendors:"
          ls -la /etc/OpenCL/vendors/ || true
          
          echo "Checking OpenCL device detection..."
          clinfo -l || echo "Warning: clinfo -l failed (non-fatal)"
          
          # Set environment for subsequent steps
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          
        shell: bash

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/build
          key: cmake-${{ runner.os }}-${{ matrix.buildtype }}-${{ hashFiles('CMakeLists.txt', 'clic/**', 'cmake/**') }}
          restore-keys: |
            cmake-${{ runner.os }}-${{ matrix.buildtype }}-

      - name: Configure CMake
        run: |
          set -euo pipefail
          cmake -S "${{ github.workspace }}" \
                 -B "${{ runner.workspace }}/build" \
                 -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} \
                 -DBUILD_COVERAGE=ON \
                 -DBUILD_BENCHMARK=OFF \
                 -DBUILD_DOCUMENTATION=OFF \
                 -DOpenCL_LIBRARY=/usr/lib/x86_64-linux-gnu/libOpenCL.so \
                 -DOpenCL_INCLUDE_DIR=/usr/include
        shell: bash

      - name: Build
        run: |
          set -euo pipefail
          cmake --build "${{ runner.workspace }}/build" \
                 --parallel ${{ env.cmake-parallel }} \
                 --config ${{ matrix.buildtype }}
        shell: bash

      - name: Run tests
        run: |
          set -euo pipefail
          cd "${{ runner.workspace }}/build"
          ctest -C ${{ matrix.buildtype }} --output-on-failure --parallel ${{ env.cmake-parallel }}
        shell: bash
        continue-on-error: true

      - name: Generate coverage report
        run: |
          set -euo pipefail
          cd "${{ runner.workspace }}/build"
          gcovr -r . \
                --filter='.*/clic/src/.*' \
                --exclude-throw-branches \
                --exclude-unreachable-branches \
                --xml \
                -o coverage.xml
        shell: bash

      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ runner.workspace }}/build/coverage.xml
          fail_ci_if_error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.buildtype }}
          path: ${{ runner.workspace }}/build/Testing/Temporary/
          if-no-files-found: ignore
