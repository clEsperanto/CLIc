name: Build CUDA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  cmake-build-type: "Release"
  cmake-parallel: 10

jobs:
  build:
    name: ${{ matrix.name }}-CUDA-${{ matrix.cmake-build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu, windows]
        include:
          - name: ubuntu
            os: ubuntu-latest
            c-compiler: "gcc"
            cxx-compiler: "g++"
            cmake-build-type: "Release"
            cmake-build-flag: ""
          - name: windows
            os: windows-latest
            c-compiler: "cl.exe"
            cxx-compiler: "cl.exe"
            cmake-build-type: "Release"
            cmake-build-flag: "-A x64"

    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: 3.8

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ninja
        shell: bash

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@v4.2.3

      - name: Install CUDA Toolkit
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.0'
          method: 'network'
          non-cuda-sub-packages: '["libcublas","libcublas-dev"]'

      - name: Verify CUDA Installation
        run: |
          echo "CUDA installed to: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
          echo "nvcc version:"
          nvcc --version
        shell: bash

      - name: Compile CLIc with CUDA
        run: |
          set -euo pipefail
          BUILD_DIR="${{ runner.workspace }}/build"
          CUDA_ROOT="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"

          # Use array to properly preserve quoted paths with spaces
          declare -a CMAKE_OPTS=(
            "-DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }}"
            "-DBUILD_DOCUMENTATION=OFF"
            "-DBUILD_BENCHMARK=OFF"
            "-DCLE_BACKEND_TYPE=CUDA"
            "-DCUDAToolkit_ROOT=$CUDA_ROOT"
          )

          cmake -S "${{ github.workspace }}" -B "$BUILD_DIR" "${CMAKE_OPTS[@]}" ${{ matrix.cmake-build-flag }}
          cmake --build "$BUILD_DIR" --parallel ${{ env.cmake-parallel }} --config Release
        shell: bash -l {0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results-cuda-${{ matrix.name }}
          path: ${{ runner.workspace }}/build/Testing/Temporary/
          if-no-files-found: ignore

