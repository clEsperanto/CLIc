# CMAKE_OPTS="$CMAKE_OPTS -DCUDAToolkit_LIBRARY_DIR=$CUDA_ROOT/lib64"
# CMAKE_OPTS="$CMAKE_OPTS -DCUDAToolkit_INCLUDE_DIRS=$CUDA_ROOT/include"
