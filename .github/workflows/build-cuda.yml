name: Build CUDA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  cmake-build-type: "Release"
  cmake-parallel: 10
  cuda-version: "12.4"

jobs:
  build:
    name: ${{ matrix.name }}-CUDA-${{ matrix.cmake-build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu, windows]
        include:
          - name: ubuntu
            os: ubuntu-latest
            c-compiler: "gcc"
            cxx-compiler: "g++"
            cmake-build-type: "Release"
            cmake-build-flag: ""
          - name: windows
            os: windows-latest
            c-compiler: "cl.exe"
            cxx-compiler: "cl.exe"
            cmake-build-type: "Release"
            cmake-build-flag: "-A x64"

    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: 3.8

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ninja
        shell: bash

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@v4.2.3

      - name: Install CUDA Toolkit (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail

          echo "Downloading CUDA 12.4 installer..."
          CUDA_URL="https://developer.download.nvidia.com/compute/cuda/12.4.1/local_installers/cuda_12.4.1_550.54.15_linux.run"
          CUDA_INSTALLER="cuda_installer.run"

          wget -q $CUDA_URL -O $CUDA_INSTALLER
          chmod +x $CUDA_INSTALLER

          echo "Installing CUDA toolkit..."
          sudo sh $CUDA_INSTALLER --silent --driver --toolkit --no-opengl-libs --no-man-page

          # Set environment variables
          echo "CUDA_HOME=/usr/local/cuda" >> $GITHUB_ENV
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

          rm -f $CUDA_INSTALLER
          echo "CUDA installation complete"
        shell: bash

      - name: Install CUDA Toolkit (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # Use Chocolatey to install CUDA (more reliable than manual installer)
          choco install cuda --version=12.4 -y --force

          # Verify CUDA installation
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
          if (Test-Path $cudaPath) {
            Write-Host "CUDA found at $cudaPath"
            Get-ChildItem "$cudaPath\bin\nvcc.exe"
          } else {
            Write-Host "CUDA not found at expected location"
            exit 1
          }

      - name: Set CUDA Environment Variables (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
          echo "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$cudaPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CUDA Installation (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: nvcc --version
        shell: bash

      - name: Verify CUDA Installation (Windows)
        if: matrix.os == 'windows-latest'
        run: nvcc --version
        shell: cmd

      - name: Compile with CUDA
        run: |
          set -euo pipefail
          BUILD_DIR="${{ runner.workspace }}/build"

          CMAKE_OPTS="-DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} -DBUILD_DOCUMENTATION=OFF -DBUILD_BENCHMARK=OFF"
          CMAKE_OPTS="$CMAKE_OPTS -DENABLE_CUDA=ON"

          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            CMAKE_OPTS="$CMAKE_OPTS -DCUDA_TOOLKIT_ROOT_DIR=/usr/local/cuda"
          fi

          cmake -S "${{ github.workspace }}" -B "$BUILD_DIR" $CMAKE_OPTS ${{ matrix.cmake-build-flag }}
          cmake --build "$BUILD_DIR" --parallel ${{ env.cmake-parallel }} --config Release
        shell: bash -l {0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results-cuda-${{ matrix.name }}
          path: ${{ runner.workspace }}/build/Testing/Temporary/
          if-no-files-found: ignore
